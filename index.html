0.5%);background-size:100% 100%,100% 100%,100% 100%;}.judge{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:10px;text-align:center}.stat b{display:block;font-size:22px}.effect{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9;font-size:88px;font-weight:1000;text-shadow:0 8px 22px #0003;animation:pop .8s ease forwards}.comboEffect{font-size:42px;color:#f97316;background:#fff;border:4px solid #f97316;border-radius:24px;padding:18px 24px;transform:rotate(-7deg)}@keyframes pop{0%{opacity:0;transform:scale(.3) rotate(-10deg)}35%{opacity:1;transform:scale(1.15) rotate(4deg)}100%{opacity:0;transform:scale(1.35) rotate(0)}}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:8px;align-items:center;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.kanji{font-size:24px;font-weight:900}.badge{border-radius:999px;background:#fee2e2;color:#991b1b;padding:5px 9px;font-weight:900}.dex{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.tile{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:12px;padding:10px;text-align:center;font-weight:900}.tile.got{background:#fef3c7;border-color:#facc15}.bottomNav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #e5e7eb;padding:8px;display:flex;justify-content:center;gap:8px;z-index:5}.bottomNav button{max-width:150px;flex:1}.rarity{font-size:34px;text-align:center}.note{font-size:13px;color:#64748b;line-height:1.6}.missAnswer{font-size:22px;font-weight:900;color:#dc2626;margin:10px 0}.progressBar{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progressBar i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#facc15);width:0%}@media(max-width:520px){.modes{grid-template-columns:repeat(2,1fr)}.reading{font-size:34px}.answer{font-size:54px}.stats{grid-template-columns:repeat(2,1fr)}.dex{grid-template-columns:repeat(5,1fr)}canvas{height:210px}.title{font-size:21px}}

<body>
<div class="app">
  <div class="top"><div class="title">漢字マスター 7C</div><div class="pill">🪙 <span id="coins">0</span></div></div>
  <div id="home" class="card">
    <h2>10問チャレンジ</h2>
    <p class="note">今のスクショ素材から作った試作版。答えが違うところはあとで直せる。</p>
    <div class="modes">
      <button class="btn" onclick="startSet('7C1')">7C1</button><button class="btn" onclick="startSet('7C2')">7C2</button><button class="btn" onclick="startSet('7C3')">7C3</button><button class="btn" onclick="startSet('7C4')">7C4</button><button class="btn secondary" onclick="startSet('ALL')">全部</button><button class="btn red" onclick="startSet('WEAK')">苦手のみ</button>
    </div>
    <div class="card" style="box-shadow:none;background:#fff7ed"><div class="stats"><div class="stat"><b id="todayCount">0</b>今日</div><div class="stat"><b id="weekCount">0</b>今週</div><div class="stat"><b id="weakCount">0</b>苦手</div><div class="stat"><b id="dexRate">0%</b>図鑑</div></div></div>
  </div>
  <div id="game" class="card hidden">
    <div class="qbox">
      <div class="meta"><span id="modeLabel"></span>　問題 <span id="qNo">1</span> / <span id="qTotal">10</span></div>
      <div class="progressBar"><i id="bar"></i></div>
      <div class="reading" id="questionText">海てい</div>
      <div class="hint">□に入る漢字を指で書こう</div>
      <div class="canvasWrap"><div class="canvasHead"><span>手書きエリア</span><button class="btn small gray" onclick="clearCanvas()">消す</button></div><canvas id="pad"></canvas></div>
      <button id="showBtn" class="btn secondary" onclick="showAnswer()">答えを見る</button>
      <div id="answerBox" class="hidden"><div class="answer" id="answerText"></div><div id="missAnswer" class="missAnswer hidden"></div><div class="judge"><button class="btn green" onclick="judge(true)">⭕️ できた</button><button class="btn red" onclick="judge(false)">❌ できなかった</button></div></div>
      <div class="meta" style="margin-top:12px">COMBO <b id="combo">0</b> / MAX <b id="maxCombo">0</b></div>
    </div>
  </div>
  <div id="result" class="card hidden"><h2>結果</h2><div class="stats"><div class="stat"><b id="resScore">0/10</b>正解</div><div class="stat"><b id="resMax">0</b>最大コンボ</div><div class="stat"><b id="resCoin">0</b>獲得コイン</div><div class="stat"><b id="resMiss">0</b>ミス</div></div><h3>今回のミス</h3><div id="missList" class="list"></div><div class="row" style="margin-top:12px"><button class="btn" onclick="startSet(currentMode)">もう一回</button><button class="btn secondary" onclick="startSet('WEAK')">苦手特訓</button><button class="btn gray" onclick="shareMisses()">ミスを送る</button></div></div>
  <div id="gacha" class="card hidden"><h2>漢字ガチャ</h2><p class="note">10コインで1回。出た漢字は図鑑に登録。</p><button class="btn gold" onclick="rollGacha()">10コインで回す</button><div id="gachaOut" class="card hidden" style="box-shadow:none"><div class="rarity" id="rarity"></div><div class="answer" id="gachaKanji"></div><div id="gachaWord" class="meta"></div></div></div>
  <div id="weak" class="card hidden"><h2>苦手リスト</h2><div id="weakList" class="list"></div></div>
  <div id="dex" class="card hidden"><h2>漢字図鑑</h2><div id="dexList" class="dex"></div></div>
</div>
<div class="bottomNav"><button class="btn small" onclick="showScreen('home')">ホーム</button><button class="btn small gold" onclick="showScreen('gacha')">ガチャ</button><button class="btn small red" onclick="showScreen('weak')">苦手</button><button class="btn small secondary" onclick="showScreen('dex')">図鑑</button></div>
<script>

{s:'7C2',q:'ひくい山',a:'低',w:'低い山'}, {s:'7C2',q:'まと外れ',a:'的',w:'的外れ'}, {s:'7C2',q:'生と',a:'徒',w:'生徒'}, {s:'7C2',q:'実どう時間',a:'働',w:'実働時間'}, {s:'7C2',q:'とち木県',a:'栃',w:'栃木県'}, {s:'7C2',q:'あついお茶',a:'熱',w:'熱いお茶'}, {s:'7C2',q:'ばい林',a:'梅',w:'梅林'}, {s:'7C2',q:'赤はん',a:'飯',w:'赤飯'}, {s:'7C2',q:'ひつ然',a:'必',w:'必然'}, {s:'7C2',q:'ふ安',a:'不',w:'不安'}, {s:'7C2',q:'名づける',a:'付',w:'名付ける'}, {s:'7C2',q:'とみと名声',a:'富',w:'富と名声'}, {s:'7C2',q:'べつ人',a:'別',w:'別人'}, {s:'7C2',q:'あたり一面',a:'辺',w:'辺り一面'}, {s:'7C2',q:'郵びん',a:'便',w:'郵便'}, {s:'7C2',q:'ほう律',a:'法',w:'法律'}, {s:'7C2',q:'結まつ',a:'末',w:'結末'}, {s:'7C2',q:'み来',a:'未',w:'未来'}, {s:'7C2',q:'ない物ねだり',a:'無',w:'無い物ねだり'}, {s:'7C2',q:'よう求',a:'要',w:'要求'}, {s:'7C2',q:'入よく',a:'浴',w:'入浴'}, {s:'7C2',q:'改りょう',a:'良',w:'改良'}, {s:'7C2',q:'重さをはかる',a:'量',w:'量る'}, {s:'7C2',q:'動物のたぐい',a:'類',w:'類い'}, {s:'7C2',q:'つめたい水',a:'冷',w:'冷たい水'}, {s:'7C2',q:'れん休',a:'連',w:'連休'}, {s:'7C2',q:'年おいる',a:'老',w:'老いる'},
{s:'7C3',q:'海てい',a:'底',w:'海底'}, {s:'7C3',q:'辞てん',a:'典',w:'辞典'}, {s:'7C3',q:'ど力',a:'努',w:'努力'}, {s:'7C3',q:'はたらき者',a:'働',w:'働き者'}, {s:'7C3',q:'奈良県',a:'奈',w:'奈良県'}, {s:'7C3',q:'信ねん',a:'念',w:'信念'}, {s:'7C3',q:'うめ干し',a:'梅',w:'梅干し'}, {s:'7C3',q:'昼めし',a:'飯',w:'昼飯'}, {s:'7C3',q:'かならずしも',a:'必',w:'必ずしも'}, {s:'7C3',q:'水ぶ',a:'夫',w:'水夫'}, {s:'7C3',q:'政ふ',a:'府',w:'政府'}, {s:'7C3',q:'ふく作用',a:'副',w:'副作用'}, {s:'7C3',q:'友とわかれる',a:'別',w:'友と別れる'}, {s:'7C3',q:'へん身',a:'変',w:'変身'}, {s:'7C3',q:'花だより',a:'便',w:'花便り'}, {s:'7C3',q:'希ぼう',a:'望',w:'希望'}, {s:'7C3',q:'すえっ子',a:'末',w:'末っ子'}, {s:'7C3',q:'国みん',a:'民',w:'国民'}, {s:'7C3',q:'予やく',a:'約',w:'予約'}, {s:'7C3',q:'チームのかなめ',a:'要',w:'要'}, {s:'7C3',q:'水あび',a:'浴',w:'水浴び'}, {s:'7C3',q:'仲よし',a:'良',w:'仲良し'}, {s:'7C3',q:'一りん車',a:'輪',w:'一輪車'}, {s:'7C3',q:'熱をさます',a:'冷',w:'冷ます'}, {s:'7C3',q:'命れい',a:'令',w:'命令'}, {s:'7C3',q:'子どもづれ',a:'連',w:'子ども連れ'}, {s:'7C3',q:'苦ろう',a:'労',w:'苦労'},
{s:'7C4',q:'そこ力',a:'底',w:'底力'}, {s:'7C4',q:'でん説',a:'伝',w:'伝説'}, {s:'7C4',q:'解決につとめる',a:'努',w:'努める'}, {s:'7C4',q:'とく技',a:'特',w:'特技'}, {s:'7C4',q:'洋なし',a:'梨',w:'洋梨'}, {s:'7C4',q:'勝ぱい',a:'敗',w:'勝敗'}, {s:'7C4',q:'はく物館',a:'博',w:'博物館'}, {s:'7C4',q:'ひ行機',a:'飛',w:'飛行機'}, {s:'7C4',q:'投ひょう',a:'票',w:'投票'}, {s:'7C4',q:'おっと',a:'夫',w:'夫'}, {s:'7C4',q:'岐ふ県',a:'阜',w:'岐阜県'}, {s:'7C4',q:'へい士',a:'兵',w:'兵士'}, {s:'7C4',q:'周へん',a:'辺',w:'周辺'}, {s:'7C4',q:'かわり種',a:'変',w:'変わり種'}, {s:'7C4',q:'ほう丁',a:'包',w:'包丁'}, {s:'7C4',q:'のぞみ',a:'望',w:'望み'}, {s:'7C4',q:'まん月',a:'満',w:'満月'}, {s:'7C4',q:'ぶ事',a:'無',w:'無事'}, {s:'7C4',q:'ゆう気',a:'勇',w:'勇気'}, {s:'7C4',q:'よう分',a:'養',w:'養分'}, {s:'7C4',q:'り点',a:'利',w:'利点'}, {s:'7C4',q:'りょう理',a:'料',w:'料理'}, {s:'7C4',q:'首わ',a:'輪',w:'首輪'}, {s:'7C4',q:'寒れい',a:'冷',w:'寒冷'}, {s:'7C4',q:'れい題',a:'例',w:'例題'}, {s:'7C4',q:'つらなる',a:'連',w:'連なる'}, {s:'7C4',q:'ろく音',a:'録',w:'録音'}
];
const $=id=>document.getElementById(id); const STORE='kanjiMaster7C_v1'; let state=load(); let current=[],idx=0,score=0,combo=0,maxCombo=0,misses=[],earned=0,currentMode='ALL',audioCtx=null;
function load(){try{return JSON.parse(localStorage.getItem(STORE))||{coins:0,weak:{},got:{},history:{}}}catch(e){return{coins:0,weak:{},got:{},history:{}}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state));updateHome()}
function uniqKanji(){return [...new Set(DATA.map(x=>x.a))].sort()}
function updateHome(){ $('coins').textContent=state.coins||0; const today=new Date().toISOString().slice(0,10); $('todayCount').textContent=state.history?.[today]||0; let week=0; for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);week+=state.history?.[d.toISOString().slice(0,10)]||0} $('weekCount').textContent=week; $('weakCount').textContent=Object.keys(state.weak||{}).length; const total=uniqKanji().length; $('dexRate').textContent=Math.round(Object.keys(state.got||{}).length/total*100)+'%';}
function showScreen(id){['home','game','result','gacha','weak','dex'].forEach(x=>$(x).classList.add('hidden')); $(id).classList.remove('hidden'); if(id==='weak')renderWeak(); if(id==='dex')renderDex(); updateHome();}
function sample(arr,n){let a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a.slice(0,Math.min(n,a.length));}
function startSet(mode){currentMode=mode; let pool= mode==='ALL'?DATA: mode==='WEAK'?DATA.filter(x=>state.weak[x.a]):DATA.filter(x=>x.s===mode); if(pool.length===0){alert('苦手リストはまだ空です。まずは普通にプレイしよう。');return} current=sample(pool,10); idx=score=combo=maxCombo=earned=0; misses=[]; $('qTotal').textContent=current.length; $('modeLabel').textContent=mode; showScreen('game'); nextQuestion();}
function nextQuestion(){ if(idx>=current.length)return finish(); const q=current[idx]; $('qNo').textContent=idx+1; $('bar').style.width=(idx/current.length*100)+'%'; $('questionText').textContent=q.q; $('answerText').textContent=''; $('answerBox').classList.add('hidden'); $('showBtn').classList.remove('hidden'); $('missAnswer').classList.add('hidden'); $('combo').textContent=combo; $('maxCombo').textContent=maxCombo; clearCanvas();}
function showAnswer(){ const q=current[idx]; $('answerText').textContent=q.a; $('answerBox').classList.remove('hidden'); $('showBtn').classList.add('hidden');}
function addHistory(){const d=new Date().toISOString().slice(0,10); state.history=state.history||{}; state.history[d]=(state.history[d]||0)+1;}
function judge(ok){ const q=current[idx]; addHistory(); state.got=state.got||{}; state.got[q.a]=true; if(ok){score++; combo++; maxCombo=Math.max(maxCombo,combo); let add=1; if(combo===5)add+=5; if(combo===10)add+=10; earned+=add; state.coins=(state.coins||0)+add; if(state.weak[q.a]){state.weak[q.a]=Math.max(0,state.weak[q.a]-1); if(state.weak[q.a]===0)delete state.weak[q.a];} effect('⭕️'); if(combo===3||combo===5||combo===10)comboPop(combo+' COMBO!'); sound(true);} else {combo=0; misses.push(q); state.weak=state.weak||{}; state.weak[q.a]=(state.weak[q.a]||0)+1; $('missAnswer').textContent='正解：'+q.w+'（'+q.a+'）'; $('missAnswer').classList.remove('hidden'); effect('❌'); sound(false); save(); setTimeout(()=>{idx++;nextQuestion()},950); return} save(); idx++; setTimeout(nextQuestion,620);}
function finish(){ $('bar').style.width='100%'; $('resScore').textContent=score+'/'+current.length; $('resMax').textContent=maxCombo; $('resCoin').textContent=earned; $('resMiss').textContent=misses.length; const box=$('missList'); box.innerHTML=misses.length?misses.map(m=>`<div class="item"><div><span class="kanji">${m.a}</span>　${m.w}<br><span class="meta">問題：${m.q}</span></div><span class="badge">苦手+1</span></div>`).join(''):'<p class="note">ミスなし。強い。</p>'; showScreen('result');}
function effect(txt){const d=document.createElement('div');d.className='effect';d.textContent=txt;document.body.appendChild(d);setTimeout(()=>d.remove(),850)}
function comboPop(txt){const d=document.createElement('div');d.className='effect comboEffect';d.textContent=txt;document.body.appendChild(d);setTimeout(()=>d.remove(),900)}
function sound(ok){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); const now=audioCtx.currentTime; const freqs=ok?[880,1320]:[220,160]; freqs.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=ok?'sine':'sawtooth'; o.frequency.value=f; g.gain.setValueAtTime(.001,now+i*.12); g.gain.exponentialRampToValueAtTime(.18,now+i*.12+.02); g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.12); o.connect(g).connect(audioCtx.destination); o.start(now+i*.12); o.stop(now+i*.12+.13);});}catch(e){}}
function renderWeak(){const list=Object.entries(state.weak||{}).sort((a,b)=>b[1]-a[1]); $('weakList').innerHTML=list.length?list.map(([k,v])=>{const ex=DATA.find(x=>x.a===k);return `<div class="item"><div><span class="kanji">${k}</span>　${ex?ex.w:''}</div><span class="badge">${v}回</span></div>`}).join(''):'<p class="note">まだ苦手はありません。</p>';}
function renderDex(){const got=state.got||{}; $('dexList').innerHTML=uniqKanji().map(k=>`<div class="tile ${got[k]?'got':''}">${got[k]?k:'？'}</div>`).join('');}
function rollGacha(){if((state.coins||0)<10){alert('コインが足りない。10コイン必要。');return} state.coins-=10; const all=DATA; const item=all[Math.floor(Math.random()*all.length)]; state.got[item.a]=true; const r=Math.random(); const rarity=r<.04?'SSR':r<.22?'レア':'ノーマル'; $('rarity').textContent=rarity==='SSR'?'🌈 SSR':rarity==='レア'?'✨ レア':'⭐ ノーマル'; $('gachaKanji').textContent=item.a; $('gachaWord').textContent=item.w+' / '+item.s; $('gachaOut').classList.remove('hidden'); sound(true); save();}
function shareMisses(){const text=misses.length?('今回のミス\n'+misses.map(m=>`${m.q} → ${m.w}（${m.a}）`).join('\n')):'今回のミスなし'; if(navigator.share)navigator.share({text}).catch(()=>{}); else {navigator.clipboard?.writeText(text); alert('ミスリストをコピーしました');}}
// canvas
const canvas=$('pad'),ctx=canvas.getContext('2d'); let drawing=false,last=null;
function resizeCanvas(){const r=canvas.getBoundingClientRect(); const ratio=window.devicePixelRatio||1; canvas.width=Math.floor(r.width*ratio); canvas.height=Math.floor(r.height*ratio); ctx.setTransform(ratio,0,0,ratio,0,0); ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=7;ctx.strokeStyle='#111827'}
function pos(e){const t=e.touches?e.touches[0]:e; const r=canvas.getBoundingClientRect(); return{x:t.clientX-r.left,y:t.clientY-r.top}}
function startDraw(e){e.preventDefault();drawing=true;last=pos(e)} function moveDraw(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p} function endDraw(e){drawing=false;last=null}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height)}
['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,startDraw,{passive:false}));['mousemove','touchmove'].forEach(ev=>canvas.addEventListener(ev,moveDraw,{passive:false}));['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>canvas.addEventListener(ev,endDraw));
window.addEventListener('resize',()=>setTimeout(resizeCanvas,100)); setTimeout(resizeCanvas,100); updateHome();
</script>
